name: Cast
options:
  bundleIdPrefix: com.castapp
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_NAME: Cast

targets:
  Cast:
    type: application
    platform: macOS
    sources:
      - path: Cast
        type: group
    settings:
      base:
        INFOPLIST_FILE: Cast/Info.plist
        CODE_SIGN_ENTITLEMENTS: Cast/Cast.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.castapp.Cast
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        LSUIElement: YES
    info:
      path: Cast/Info.plist
      properties:
        CFBundleName: Cast
        CFBundleDisplayName: Cast
        CFBundleIdentifier: com.castapp.Cast
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Cast
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
